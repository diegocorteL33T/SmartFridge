<mat-toolbar color="primary" class="toolbar">
  <mat-icon class="logo-icon">kitchen</mat-icon>
  <span class="app-title">SmartFridge</span>
  <span class="spacer"></span>
  <a mat-button routerLink="/dashboard" routerLinkActive="nav-active">
    <mat-icon>inventory_2</mat-icon>
    {{ 'NAV.MY_FRIDGE' | translate }}
  </a>
  <a mat-button routerLink="/recipe" routerLinkActive="nav-active">
    <mat-icon>auto_awesome</mat-icon>
    {{ 'NAV.RECIPE_AI' | translate }}
  </a>
  <button mat-icon-button (click)="theme.toggle()" [title]="theme.isDark() ? 'Light mode' : 'Dark mode'">
    <mat-icon>{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
  <button mat-button (click)="toggleLang()" class="lang-btn">
    <mat-icon>language</mat-icon>
    {{ currentLang === 'en' ? 'EN' : 'PT' }}
  </button>
</mat-toolbar>

<div class="page-content">
  <router-outlet />
</div>
